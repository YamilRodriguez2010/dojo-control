<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dojo Control - Gestión de Cuotas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #2d3748;
            --primary: #d32f2f; --border-color: #e2e8f0; --table-th-bg: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); padding: 15px; }

        /* ESTILOS PARA MÓVIL: VISTA LINEAL */
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 13px; text-align: center; }
        
        @media screen and (max-width: 768px) {
            th, td { font-size: 11px; padding: 8px 4px; }
            .btn-sm { padding: 5px !important; }
        }

        /* CONFIGURACIÓN DE IMPRESIÓN */
        .print-only, .print-header, .print-mes-container { display: none; }

        @media print {
            body { background: #fff; padding: 0; }
            header, .card:has(#form-alumno), .period-selector, .btn-sm, .acciones-header, .alert-banner { display: none !important; }
            
            .print-header { display: block !important; position: relative; text-align: center; padding-bottom: 10px; border-bottom: 3px solid #000; }
            .print-header img { position: absolute; left: 0; top: 0; width: 70px; }
            .print-mes-container { display: block !important; text-align: center; margin: 15px 0; font-weight: bold; }
            
            table { width: 100% !important; border-top: 2px solid #000; border-bottom: 2px solid #000; }
            th { background: #eee !important; border-bottom: 2px solid #000 !important; }
            td { border-bottom: 1px solid #000 !important; }
            .table-date-input { display: none !important; }
            .print-only { display: inline !important; }
        }
    </style>
</head>
<body>

    <div class="print-header">
        <img src="logo.png" alt="Logo">
        <h1>Butoku-Kai Shotokan Karate-Do</h1>
        <p>Reporte Oficial de Control de Cuotas</p>
    </div>
    <div class="print-mes-container">
        Mes de Gestión: <span id="print-mes"></span>
    </div>

    <div class="container">
        <div class="period-selector">
            <input type="month" id="mes-selector">
        </div>

        <div class="card">
            <h2>Listado de Alumnos</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Teléfono</th>
                            <th>Fecha de Pago</th>
                            <th>Cuota</th>
                            <th>Estado</th>
                            <th class="acciones-header">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-alumnos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        // (Tu lógica de Firebase y renderizado sigue funcionando igual)
        // Solo asegúrate de conectar el print-mes al selector:
        const mesSelector = document.getElementById('mes-selector');
        const printMes = document.getElementById('print-mes');
        
        function actualizarMesImpresion() {
            const fecha = new Date(mesSelector.value + "-02");
            const nombreMes = fecha.toLocaleString('es-ES', { month: 'long', year: 'numeric' });
            printMes.innerText = nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1);
        }
        
        mesSelector.addEventListener('change', actualizarMesImpresion);
        // Inicializar
        const hoy = new Date();
        mesSelector.value = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0');
        actualizarMesImpresion();
    </script>
</body>
</html>
