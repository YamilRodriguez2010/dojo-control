<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dojo Control - Gestión de Cuotas en la Nube</title>
    
    <style>
        /* ... (MANTENER TODO EL CSS ANTERIOR IGUAL HASTA EL BLOQUE DE DISEÑO PARA CELULARES) ... */

        /* --- MODIFICACIÓN: DISEÑO PARA CELULARES EN PANTALLA --- */
        @media screen and (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            
            /* FORZAR LÍNEA HORIZONTAL EN CELULARES */
            .card { overflow-x: auto; }
            table { width: max-content; } /* Asegura que la tabla no se colapse */
            
            th, td { 
                padding: 8px 6px !important; 
                font-size: 11px !important; 
                white-space: nowrap; 
            }
            
            /* Ocultar botones de acción en móvil si es necesario para ahorrar espacio, 
               o hacerlos más pequeños */
            .btn-sm { padding: 4px 6px !important; font-size: 10px !important; }
            .btn-icon-only { width: 28px !important; height: 28px !important; }
            
            /* Asegurar que las columnas principales sean visibles */
            .col-telefono, .col-oculta-principal { display: table-cell !important; }
        }

        /* --- CONFIGURACIÓN DE IMPRESIÓN (SIN CAMBIOS) --- */
        @media print {
            /* (Tu código de impresión existente) */
        }
    </style>
</head>
<body>
    <!-- (El resto del HTML y JavaScript se mantiene igual) -->
    
    <div class="card">
        <div class="card-header-actions">
            <h2 style="margin:0;">Listado de Alumnos</h2>
            <button class="btn btn-sm btn-secondary" id="btn-imprimir" title="Imprimir Reporte">
                <i class="fas fa-print"></i>
            </button>
        </div>
        <!-- Contenedor con scroll horizontal para asegurar la visualización en 1 renglón -->
        <div style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
            <table id="tabla-alumnos-container">
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th class="col-telefono">Teléfono</th>
                        <th>Fecha de Pago</th>
                        <th class="col-oculta-principal">Cuota</th>
                        <th class="col-oculta-principal">Estado</th>
                        <th class="acciones-header">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-alumnos"></tbody>
            </table>
        </div>
    </div>

    <!-- (El resto de scripts y cierres de etiquetas se mantienen igual) -->
</body>
</html>
